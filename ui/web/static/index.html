<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CodeAgent</title>
<style>
:root {
  --bg: #0d1117; --surface: #161b22; --surface2: #21262d; --border: #30363d;
  --text: #e6edf3; --text2: #8b949e; --accent: #58a6ff; --green: #3fb950;
  --yellow: #d29922; --red: #f85149; --purple: #bc8cff;
  --font: 'Segoe UI', system-ui, -apple-system, sans-serif;
  --mono: 'Cascadia Code', 'Fira Code', 'JetBrains Mono', monospace;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: var(--font); background: var(--bg); color: var(--text); height: 100vh; display: flex; flex-direction: column; }

.header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 12px 20px; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
.header h1 { font-size: 18px; font-weight: 600; }
.header h1 span { color: var(--accent); }
.header-right { display: flex; gap: 12px; align-items: center; }
.status-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--green); display: inline-block; }
.status-dot.offline { background: var(--red); }
.btn { background: var(--surface2); border: 1px solid var(--border); color: var(--text); padding: 6px 14px; border-radius: 6px; cursor: pointer; font-size: 13px; transition: all 0.15s; }
.btn:hover { background: var(--border); border-color: var(--accent); }
.btn-accent { background: var(--accent); color: #000; border-color: var(--accent); }

.main { display: flex; flex: 1; overflow: hidden; }
.sidebar { width: 260px; background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; flex-shrink: 0; }
.sidebar-header { padding: 12px 16px; border-bottom: 1px solid var(--border); font-size: 13px; color: var(--text2); text-transform: uppercase; letter-spacing: 0.5px; }
.sidebar-content { flex: 1; overflow-y: auto; padding: 8px; }
.session-item { padding: 10px 12px; border-radius: 6px; cursor: pointer; margin-bottom: 4px; font-size: 13px; color: var(--text2); display: flex; align-items: center; gap: 6px; }
.session-item:hover, .session-item.active { background: var(--surface2); color: var(--text); }
.session-item .session-text { flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.session-item .del-btn { display: none; background: none; border: none; color: var(--red); cursor: pointer; font-size: 14px; padding: 0 4px; flex-shrink: 0; opacity: 0.7; }
.session-item .del-btn:hover { opacity: 1; }
.session-item:hover .del-btn { display: inline-block; }
.sidebar-footer { padding: 12px; border-top: 1px solid var(--border); }

.chat-area { flex: 1; display: flex; flex-direction: column; }
.messages { flex: 1; overflow-y: auto; padding: 20px; }

.msg { margin-bottom: 16px; animation: fadeIn 0.2s; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; } }
.msg-user { display: flex; justify-content: flex-end; }
.msg-user .msg-bubble { background: #1a3a5c; border: 1px solid #264a6e; border-radius: 12px 12px 2px 12px; max-width: 70%; padding: 10px 14px; }
.msg-assistant .msg-bubble { background: var(--surface); border: 1px solid var(--border); border-radius: 12px 12px 12px 2px; max-width: 85%; padding: 12px 16px; }
.msg-tool { margin: 4px 0; }
.msg-tool .msg-bubble { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 8px 12px; font-family: var(--mono); font-size: 12px; max-width: 85%; }
.msg-tool .tool-label { color: var(--yellow); font-size: 11px; font-weight: 600; text-transform: uppercase; margin-bottom: 4px; }
.msg-error .msg-bubble { background: #3d1418; border: 1px solid var(--red); border-radius: 8px; padding: 10px 14px; color: var(--red); }
.msg-status { text-align: center; }
.msg-status .msg-bubble { display: inline-block; background: transparent; color: var(--text2); font-size: 12px; padding: 4px 12px; }

.msg-bubble pre { background: #0d1117; border: 1px solid var(--border); border-radius: 6px; padding: 10px; overflow-x: auto; margin: 8px 0; font-family: var(--mono); font-size: 13px; }
.msg-bubble code { font-family: var(--mono); font-size: 13px; background: var(--surface2); padding: 1px 5px; border-radius: 3px; }
.msg-bubble pre code { background: transparent; padding: 0; }
.msg-bubble p { margin: 4px 0; line-height: 1.5; }

.input-area { padding: 12px 20px; border-top: 1px solid var(--border); background: var(--surface); flex-shrink: 0; }
.input-row { display: flex; gap: 8px; }
.input-row input { flex: 1; background: var(--bg); border: 1px solid var(--border); color: var(--text); padding: 10px 14px; border-radius: 8px; font-size: 14px; font-family: var(--font); outline: none; transition: border-color 0.15s; }
.input-row input:focus { border-color: var(--accent); }
.input-row input::placeholder { color: var(--text2); }
.send-btn { background: var(--accent); color: #000; border: none; padding: 10px 20px; border-radius: 8px; font-weight: 600; cursor: pointer; font-size: 14px; }
.send-btn:hover { opacity: 0.9; }
.send-btn:disabled { opacity: 0.4; cursor: not-allowed; }

.typing { display: inline-flex; gap: 4px; padding: 8px 14px; }
.typing span { width: 6px; height: 6px; border-radius: 50%; background: var(--text2); animation: blink 1.4s infinite both; }
.typing span:nth-child(2) { animation-delay: 0.2s; }
.typing span:nth-child(3) { animation-delay: 0.4s; }
@keyframes blink { 0%, 80%, 100% { opacity: 0.3; } 40% { opacity: 1; } }

.info-panel { padding: 12px; font-size: 12px; color: var(--text2); }
.info-row { display: flex; justify-content: space-between; margin-bottom: 6px; }

@media (max-width: 768px) {
  .sidebar { display: none; }
  .msg-user .msg-bubble, .msg-assistant .msg-bubble { max-width: 95%; }
}
</style>
</head>
<body>

<div class="header">
  <h1><span>Code</span>Agent</h1>
  <div class="header-right">
    <span class="status-dot" id="statusDot"></span>
    <span id="modelName" style="font-size:13px;color:var(--text2)">—</span>
    <button class="btn" onclick="newSession()">+ New Chat</button>
  </div>
</div>

<div class="main">
  <div class="sidebar">
    <div class="sidebar-header">Sessions</div>
    <div class="sidebar-content" id="sessionList"></div>
    <div class="sidebar-footer">
      <div class="info-panel">
        <div class="info-row"><span>Tools</span><span id="toolCount">—</span></div>
        <div class="info-row"><span>Messages</span><span id="msgCount">0</span></div>
      </div>
    </div>
  </div>

  <div class="chat-area">
    <div class="messages" id="messages"></div>
    <div class="input-area">
      <div class="input-row">
        <input type="text" id="chatInput" placeholder="Type a message..." autocomplete="off"
               onkeydown="if(event.key==='Enter')sendMessage()">
        <button class="send-btn" id="sendBtn" onclick="sendMessage()">Send</button>
      </div>
    </div>
  </div>
</div>

<script>
let ws = null;
let sessionId = null;
let processing = false;

async function init() {
  try {
    const health = await fetch('/api/health').then(r => r.json());
    document.getElementById('statusDot').classList.remove('offline');
    document.getElementById('modelName').textContent = health.model || '—';
  } catch {
    document.getElementById('statusDot').classList.add('offline');
  }
  try {
    const tools = await fetch('/api/tools').then(r => r.json());
    document.getElementById('toolCount').textContent = tools.tools?.length || 0;
  } catch {}
  loadSessions();
  await newSession();
}

async function loadSessions() {
  try {
    const data = await fetch('/api/sessions').then(r => r.json());
    const el = document.getElementById('sessionList');
    el.innerHTML = '';
    (data.sessions || []).forEach(s => {
      const div = document.createElement('div');
      div.className = 'session-item' + (s.id === sessionId ? ' active' : '');
      div.dataset.sid = s.id;

      const txt = document.createElement('span');
      txt.className = 'session-text';
      txt.textContent = s.preview || s.id;
      txt.title = s.id;
      txt.onclick = () => switchSession(s.id);

      const del = document.createElement('button');
      del.className = 'del-btn';
      del.innerHTML = '&#10005;';
      del.title = 'Delete session';
      del.onclick = (e) => { e.stopPropagation(); deleteSession(s.id); };

      div.appendChild(txt);
      div.appendChild(del);
      el.appendChild(div);
    });
  } catch {}
}

async function newSession() {
  try {
    const data = await fetch('/api/session/new', { method: 'POST' }).then(r => r.json());
    sessionId = data.session_id;
    connectWS();
    document.getElementById('messages').innerHTML = '';
    document.getElementById('msgCount').textContent = '0';
    addMsg('status', 'New session started — ' + sessionId);
  } catch (e) {
    addMsg('error', 'Failed to create session: ' + e);
  }
}

async function switchSession(id) {
  sessionId = id;
  connectWS();
  document.getElementById('messages').innerHTML = '';
  document.querySelectorAll('.session-item').forEach(el => {
    el.classList.toggle('active', el.dataset.sid === id);
  });
  try {
    const data = await fetch(`/api/session/${id}`).then(r => r.json());
    if (data.messages) {
      let count = 0;
      data.messages.forEach(m => {
        if (m.role === 'user') {
          addMsg('user', m.content);
          count++;
        } else if (m.role === 'assistant') {
          addMsg('assistant', m.content);
        }
      });
      document.getElementById('msgCount').textContent = count;
    }
  } catch {
    addMsg('status', 'Switched to session ' + id);
  }
}

async function deleteSession(id) {
  if (!confirm('Delete this session?')) return;
  try {
    await fetch(`/api/session/${id}`, { method: 'DELETE' });
    if (sessionId === id) {
      await newSession();
    }
    loadSessions();
  } catch (e) {
    addMsg('error', 'Failed to delete session: ' + e);
  }
}

function connectWS() {
  if (ws) { ws.close(); ws = null; }
  const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  ws = new WebSocket(`${proto}//${location.host}/ws/${sessionId}`);
  ws.onmessage = (e) => {
    const data = JSON.parse(e.data);
    handleEvent(data);
  };
  ws.onerror = () => addMsg('error', 'WebSocket error');
  ws.onclose = () => {
    document.getElementById('statusDot').classList.add('offline');
  };
  ws.onopen = () => {
    document.getElementById('statusDot').classList.remove('offline');
  };
}

function handleEvent(evt) {
  switch (evt.type) {
    case 'text':
      removeTyping();
      addMsg('assistant', evt.content);
      break;
    case 'tool_start':
      addMsg('tool', `Calling <b>${evt.tool_name}</b>`, 'tool-start');
      break;
    case 'tool_result':
      addMsg('tool', `<b>${evt.tool_name}</b> result:\n${escHtml(evt.content)}`, 'tool-result');
      break;
    case 'status':
      addMsg('status', evt.content);
      break;
    case 'error':
      removeTyping();
      addMsg('error', evt.content);
      break;
    case 'done':
      removeTyping();
      processing = false;
      document.getElementById('sendBtn').disabled = false;
      document.getElementById('chatInput').focus();
      break;
  }
}

function sendMessage() {
  const input = document.getElementById('chatInput');
  const msg = input.value.trim();
  if (!msg || !ws || ws.readyState !== 1 || processing) return;
  processing = true;
  document.getElementById('sendBtn').disabled = true;
  addMsg('user', msg);
  showTyping();
  ws.send(JSON.stringify({ message: msg }));
  input.value = '';
  const mc = document.getElementById('msgCount');
  mc.textContent = parseInt(mc.textContent) + 1;
}

function addMsg(role, content, extraClass) {
  const container = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = `msg msg-${role} ${extraClass || ''}`;
  const bubble = document.createElement('div');
  bubble.className = 'msg-bubble';
  if (role === 'tool') {
    const label = document.createElement('div');
    label.className = 'tool-label';
    label.textContent = 'Tool';
    bubble.appendChild(label);
    const pre = document.createElement('pre');
    pre.innerHTML = content;
    bubble.appendChild(pre);
  } else if (role === 'assistant') {
    bubble.innerHTML = renderMd(content);
  } else if (role === 'user') {
    bubble.textContent = content;
  } else {
    bubble.innerHTML = content;
  }
  div.appendChild(bubble);
  container.appendChild(div);
  container.scrollTop = container.scrollHeight;
}

function showTyping() {
  const container = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = 'msg msg-assistant';
  div.id = 'typingIndicator';
  div.innerHTML = '<div class="msg-bubble"><div class="typing"><span></span><span></span><span></span></div></div>';
  container.appendChild(div);
  container.scrollTop = container.scrollHeight;
}

function removeTyping() {
  const el = document.getElementById('typingIndicator');
  if (el) el.remove();
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function renderMd(text) {
  let html = escHtml(text);
  html = html.replace(/```(\w*)\n([\s\S]*?)```/g, (_, lang, code) =>
    `<pre><code>${code.trim()}</code></pre>`
  );
  html = html.replace(/`([^`]+)`/g, '<code>$1</code>');
  html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  html = html.replace(/\*(.+?)\*/g, '<em>$1</em>');
  html = html.replace(/^### (.+)$/gm, '<h4>$1</h4>');
  html = html.replace(/^## (.+)$/gm, '<h3>$1</h3>');
  html = html.replace(/^# (.+)$/gm, '<h2>$1</h2>');
  html = html.replace(/^- (.+)$/gm, '<li>$1</li>');
  html = html.replace(/\n\n/g, '</p><p>');
  html = '<p>' + html + '</p>';
  return html;
}

init();
</script>
</body>
</html>
