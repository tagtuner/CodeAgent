<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CodeAgent</title>
<style>
:root {
  --bg: #0d1117; --surface: #161b22; --surface2: #21262d; --border: #30363d;
  --text: #e6edf3; --text2: #8b949e; --accent: #58a6ff; --green: #3fb950;
  --yellow: #d29922; --red: #f85149; --purple: #bc8cff;
  --font: 'Segoe UI', system-ui, -apple-system, sans-serif;
  --mono: 'Cascadia Code', 'Fira Code', 'JetBrains Mono', monospace;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: var(--font); background: var(--bg); color: var(--text); height: 100vh; display: flex; flex-direction: column; }

.header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 12px 20px; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
.header h1 { font-size: 18px; font-weight: 600; }
.header h1 span { color: var(--accent); }
.header-right { display: flex; gap: 12px; align-items: center; }
.status-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--green); display: inline-block; }
.status-dot.offline { background: var(--red); }
.btn { background: var(--surface2); border: 1px solid var(--border); color: var(--text); padding: 6px 14px; border-radius: 6px; cursor: pointer; font-size: 13px; transition: all 0.15s; }
.btn:hover { background: var(--border); border-color: var(--accent); }

.main { display: flex; flex: 1; overflow: hidden; }
.sidebar { width: 260px; background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; flex-shrink: 0; }
.sidebar-header { padding: 12px 16px; border-bottom: 1px solid var(--border); font-size: 13px; color: var(--text2); text-transform: uppercase; letter-spacing: 0.5px; }
.sidebar-content { flex: 1; overflow-y: auto; padding: 8px; }
.session-item { padding: 10px 12px; border-radius: 6px; cursor: pointer; margin-bottom: 4px; font-size: 13px; color: var(--text2); display: flex; align-items: center; gap: 6px; }
.session-item:hover, .session-item.active { background: var(--surface2); color: var(--text); }
.session-item .session-text { flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.session-item .del-btn { display: none; background: none; border: none; color: var(--red); cursor: pointer; font-size: 14px; padding: 0 4px; flex-shrink: 0; opacity: 0.7; }
.session-item .del-btn:hover { opacity: 1; }
.session-item:hover .del-btn { display: inline-block; }
.sidebar-footer { padding: 12px; border-top: 1px solid var(--border); }

.chat-area { flex: 1; display: flex; flex-direction: column; min-width: 0; }
.messages { flex: 1; overflow-y: auto; padding: 20px; }

.msg { margin-bottom: 16px; animation: fadeIn 0.2s; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; } }
.msg-user { display: flex; flex-direction: column; align-items: flex-end; }
.msg-user .msg-bubble { background: #1a3a5c; border: 1px solid #264a6e; border-radius: 12px 12px 2px 12px; max-width: 70%; padding: 10px 14px; word-break: break-word; white-space: pre-wrap; }
.msg-assistant { display: flex; flex-direction: column; align-items: flex-start; }
.msg-assistant .msg-bubble { background: var(--surface); border: 1px solid var(--border); border-radius: 12px 12px 12px 2px; max-width: 85%; padding: 12px 16px; }
.msg-tool { margin: 4px 0; }
.msg-tool .msg-bubble { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 8px 12px; font-family: var(--mono); font-size: 12px; max-width: 85%; }
.msg-tool .tool-label { color: var(--yellow); font-size: 11px; font-weight: 600; text-transform: uppercase; margin-bottom: 4px; }
.msg-error .msg-bubble { background: #3d1418; border: 1px solid var(--red); border-radius: 8px; padding: 10px 14px; color: var(--red); }
.msg-status { text-align: center; }
.msg-status .msg-bubble { display: inline-block; background: transparent; color: var(--text2); font-size: 12px; padding: 4px 12px; }

.msg-bubble pre { background: #0d1117; border: 1px solid var(--border); border-radius: 6px; padding: 10px; overflow-x: auto; margin: 8px 0; font-family: var(--mono); font-size: 12px; max-height: 300px; overflow-y: auto; white-space: pre-wrap; word-break: break-word; }
.msg-bubble code { font-family: var(--mono); font-size: 13px; background: var(--surface2); padding: 1px 5px; border-radius: 3px; }
.msg-bubble pre code { background: transparent; padding: 0; }
.msg-bubble p { margin: 4px 0; line-height: 1.5; }
.msg-tool .msg-bubble { max-width: 95%; }
.msg-tool .msg-bubble pre { max-height: 250px; font-size: 11px; }

.msg-actions { display: none; gap: 3px; margin-top: 5px; }
.msg:hover .msg-actions { display: flex; }
.msg-user .msg-actions { justify-content: flex-end; }
.msg-actions button { background: var(--surface2); border: 1px solid transparent; color: var(--text2); cursor: pointer; padding: 3px 8px; border-radius: 4px; font-size: 11px; line-height: 1.4; transition: all 0.12s; }
.msg-actions button:hover { border-color: var(--border); color: var(--text); background: var(--border); }

.approval-box { background: var(--surface); border: 1px solid var(--yellow); border-radius: 8px; padding: 14px 16px; margin-bottom: 16px; animation: fadeIn 0.2s; max-width: 85%; }
.approval-title { color: var(--yellow); font-weight: 600; font-size: 13px; margin-bottom: 8px; }
.approval-box .tool-info { font-size: 13px; margin-bottom: 6px; color: var(--text); }
.approval-box pre { background: var(--bg); border: 1px solid var(--border); border-radius: 6px; padding: 8px 10px; font-size: 11px; font-family: var(--mono); margin: 8px 0; overflow-x: auto; max-height: 200px; overflow-y: auto; }
.approval-btns { display: flex; gap: 8px; margin-top: 10px; }
.approval-btns button { padding: 6px 18px; border-radius: 6px; font-weight: 600; cursor: pointer; border: none; font-size: 13px; transition: opacity 0.12s; }
.btn-allow { background: var(--green); color: #000; }
.btn-allow:hover { opacity: 0.85; }
.btn-deny { background: var(--red); color: #fff; }
.btn-deny:hover { opacity: 0.85; }

/* Terminal Panel */
.terminal-panel { display: none; flex-direction: column; background: #0a0a0a; border-top: 2px solid var(--accent); height: 250px; max-height: 280px; flex-shrink: 0; transition: max-height 0.3s ease; }
.terminal-panel.visible { display: flex; }
.terminal-panel.minimized { max-height: 34px; overflow: hidden; }
.term-toolbar { display: flex; align-items: center; padding: 5px 12px; background: #1a1a2e; border-bottom: 1px solid #2a2a3e; gap: 8px; flex-shrink: 0; }
.term-title { font-size: 12px; font-weight: 600; color: var(--accent); font-family: var(--mono); }
.term-status { font-size: 11px; color: var(--text2); font-family: var(--mono); }
.term-btn { background: none; border: 1px solid #333; color: var(--text2); cursor: pointer; padding: 1px 8px; border-radius: 3px; font-size: 11px; font-family: var(--mono); transition: all 0.12s; }
.term-btn:hover { color: var(--text); border-color: var(--accent); }
.term-kill { color: var(--red); border-color: #442; }
.term-kill:hover { border-color: var(--red); }
.term-tabs { display: flex; gap: 0; overflow-x: auto; flex: 1; margin: 0 4px; }
.term-tab { display: flex; align-items: center; gap: 4px; padding: 2px 10px; background: #12121e; border: 1px solid #2a2a3e; border-bottom: none; border-radius: 4px 4px 0 0; cursor: pointer; font-size: 11px; font-family: var(--mono); color: var(--text2); white-space: nowrap; transition: all 0.12s; }
.term-tab:hover { background: #1e1e32; color: var(--text); }
.term-tab.active { background: #1a1a2e; color: var(--accent); border-color: var(--accent); border-bottom-color: transparent; }
.term-tab .tab-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
.term-tab .tab-dot.running { background: var(--yellow); }
.term-tab .tab-dot.done { background: var(--green); }
.term-tab .tab-dot.error { background: var(--red); }
.term-tab .tab-dot.idle { background: var(--text2); }
.term-tab .tab-x { font-size: 12px; color: var(--text2); cursor: pointer; padding: 0 2px; opacity: 0.6; }
.term-tab .tab-x:hover { color: var(--red); opacity: 1; }
.term-body-wrap { flex: 1; position: relative; overflow: hidden; }
.term-body { overflow-y: auto; padding: 8px 12px; font-family: var(--mono); font-size: 12px; line-height: 1.6; color: #c8c8c8; position: absolute; inset: 0; display: none; }
.term-body.active { display: block; }
.term-cmd { color: var(--green); font-weight: 600; margin-top: 6px; }
.term-cmd::before { content: '$ '; color: var(--accent); font-weight: 400; }
.term-line { color: #d0d0d0; }
.term-exit-ok { color: var(--green); font-size: 11px; margin-top: 4px; padding: 2px 0; border-top: 1px dashed #222; }
.term-exit-err { color: var(--red); font-size: 11px; margin-top: 4px; padding: 2px 0; border-top: 1px dashed #222; }

.stats-bar { display: flex; gap: 16px; padding: 6px 20px; background: var(--surface2); border-top: 1px solid var(--border); font-size: 12px; color: var(--text2); align-items: center; flex-shrink: 0; }
.stats-bar .stat { display: flex; align-items: center; gap: 4px; }
.stats-bar .stat-icon { font-size: 14px; }
.stats-bar .stat-value { color: var(--accent); font-weight: 600; font-family: var(--mono); }
.stats-bar .stat-label { color: var(--text2); }
.stats-bar .tps { color: var(--green); }
.stats-bar .elapsed { color: var(--yellow); }

.input-area { padding: 12px 20px; border-top: 1px solid var(--border); background: var(--surface); flex-shrink: 0; }
.input-row { display: flex; gap: 8px; }
.input-row input { flex: 1; background: var(--bg); border: 1px solid var(--border); color: var(--text); padding: 10px 14px; border-radius: 8px; font-size: 14px; font-family: var(--font); outline: none; transition: border-color 0.15s; }
.input-row input:focus { border-color: var(--accent); }
.input-row input::placeholder { color: var(--text2); }
.send-btn { background: var(--accent); color: #000; border: none; padding: 10px 20px; border-radius: 8px; font-weight: 600; cursor: pointer; font-size: 14px; }
.send-btn:hover { opacity: 0.9; }
.send-btn:disabled { opacity: 0.4; cursor: not-allowed; }
.stop-btn { background: var(--red); color: #fff; border: none; padding: 10px 20px; border-radius: 8px; font-weight: 600; cursor: pointer; font-size: 14px; display: none; }
.stop-btn:hover { opacity: 0.85; }

.typing { display: inline-flex; gap: 4px; padding: 8px 14px; }
.typing span { width: 6px; height: 6px; border-radius: 50%; background: var(--text2); animation: blink 1.4s infinite both; }
.typing span:nth-child(2) { animation-delay: 0.2s; }
.typing span:nth-child(3) { animation-delay: 0.4s; }
@keyframes blink { 0%, 80%, 100% { opacity: 0.3; } 40% { opacity: 1; } }

.info-panel { padding: 12px; font-size: 12px; color: var(--text2); }
.info-row { display: flex; justify-content: space-between; margin-bottom: 6px; }

@media (max-width: 768px) {
  .sidebar { display: none; }
  .msg-user .msg-bubble, .msg-assistant .msg-bubble { max-width: 95%; }
}
</style>
</head>
<body>

<div class="header">
  <h1><span>Code</span>Agent</h1>
  <div class="header-right">
    <span class="status-dot" id="statusDot"></span>
    <span id="modelName" style="font-size:13px;color:var(--text2)">—</span>
    <button class="btn" onclick="newSession()">+ New Chat</button>
  </div>
</div>

<div class="main">
  <div class="sidebar">
    <div class="sidebar-header">Sessions</div>
    <div class="sidebar-content" id="sessionList"></div>
    <div class="sidebar-footer">
      <div class="info-panel">
        <div class="info-row"><span>Tools</span><span id="toolCount">—</span></div>
        <div class="info-row"><span>Messages</span><span id="msgCount">0</span></div>
      </div>
    </div>
  </div>

  <div class="chat-area">
    <div class="messages" id="messages"></div>

    <div class="terminal-panel" id="termPanel">
      <div class="term-toolbar">
        <span class="term-title">Workers</span>
        <div class="term-tabs" id="termTabs"></div>
        <span class="term-status" id="termStatus">idle</span>
        <button class="term-btn" onclick="toggleTerminal()" title="Minimize/Expand">_</button>
        <button class="term-btn" onclick="clearActiveTab()" title="Clear">C</button>
        <button class="term-btn term-kill" onclick="killActiveWorker()" title="Kill active">X</button>
      </div>
      <div class="term-body-wrap" id="termBodyWrap"></div>
    </div>

    <div class="stats-bar" id="statsBar" style="display:none">
      <div class="stat"><span class="stat-icon">T</span> <span class="stat-value" id="statTokens">0</span> <span class="stat-label">tokens</span></div>
      <div class="stat"><span class="stat-icon">&#9201;</span> <span class="stat-value elapsed" id="statTime">0s</span></div>
      <div class="stat"><span class="stat-icon">&#9889;</span> <span class="stat-value tps" id="statTPS">0</span> <span class="stat-label">t/s</span></div>
      <div class="stat"><span class="stat-icon">&#8593;</span> <span class="stat-value" id="statPrompt">0</span> <span class="stat-label">prompt</span></div>
      <div class="stat"><span class="stat-icon">&#8595;</span> <span class="stat-value" id="statCompletion">0</span> <span class="stat-label">completion</span></div>
    </div>
    <div class="input-area">
      <div class="input-row">
        <input type="text" id="chatInput" placeholder="Type a message..." autocomplete="off"
               onkeydown="if(event.key==='Enter')sendMessage()">
        <button class="send-btn" id="sendBtn" onclick="sendMessage()">Send</button>
        <button class="stop-btn" id="stopBtn" onclick="stopGeneration()">Stop</button>
      </div>
    </div>
  </div>
</div>

<script>
let ws = null;
let sessionId = null;
let processing = false;
let streamStart = 0;
let streamTokens = 0;
let workerActive = false;
let workerTabs = {};
let activeTabId = null;

async function init() {
  try {
    const health = await fetch('/api/health').then(r => r.json());
    document.getElementById('statusDot').classList.remove('offline');
    document.getElementById('modelName').textContent = health.model || '—';
  } catch {
    document.getElementById('statusDot').classList.add('offline');
  }
  try {
    const tools = await fetch('/api/tools').then(r => r.json());
    document.getElementById('toolCount').textContent = tools.tools?.length || 0;
  } catch {}
  loadSessions();
  await newSession();
}

async function loadSessions() {
  try {
    const data = await fetch('/api/sessions').then(r => r.json());
    const el = document.getElementById('sessionList');
    el.innerHTML = '';
    (data.sessions || []).forEach(s => {
      const div = document.createElement('div');
      div.className = 'session-item' + (s.id === sessionId ? ' active' : '');
      div.dataset.sid = s.id;
      const txt = document.createElement('span');
      txt.className = 'session-text';
      txt.textContent = s.preview || s.id;
      txt.title = s.id;
      txt.onclick = () => switchSession(s.id);
      const del = document.createElement('button');
      del.className = 'del-btn';
      del.innerHTML = '&#10005;';
      del.title = 'Delete session';
      del.onclick = (e) => { e.stopPropagation(); deleteSession(s.id); };
      div.appendChild(txt);
      div.appendChild(del);
      el.appendChild(div);
    });
  } catch {}
}

async function newSession() {
  try {
    const data = await fetch('/api/session/new', { method: 'POST' }).then(r => r.json());
    sessionId = data.session_id;
    connectWS();
    document.getElementById('messages').innerHTML = '';
    document.getElementById('msgCount').textContent = '0';
    resetTerminal();
    hideTerminal();
    addMsg('status', 'New session started — ' + sessionId);
  } catch (e) {
    addMsg('error', 'Failed to create session: ' + e);
  }
}

async function switchSession(id) {
  sessionId = id;
  connectWS();
  document.getElementById('messages').innerHTML = '';
  resetTerminal();
  hideTerminal();
  document.querySelectorAll('.session-item').forEach(el => {
    el.classList.toggle('active', el.dataset.sid === id);
  });
  try {
    const data = await fetch(`/api/session/${id}`).then(r => r.json());
    if (data.messages) {
      let count = 0;
      data.messages.forEach(m => {
        if (m.role === 'user') { addMsg('user', m.content); count++; }
        else if (m.role === 'assistant') { addMsg('assistant', m.content); }
      });
      document.getElementById('msgCount').textContent = count;
    }
  } catch {
    addMsg('status', 'Switched to session ' + id);
  }
}

async function deleteSession(id) {
  if (!confirm('Delete this session?')) return;
  try {
    await fetch(`/api/session/${id}`, { method: 'DELETE' });
    if (sessionId === id) await newSession();
    loadSessions();
  } catch (e) {
    addMsg('error', 'Failed to delete session: ' + e);
  }
}

function connectWS() {
  if (ws) { ws.close(); ws = null; }
  const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  ws = new WebSocket(`${proto}//${location.host}/ws/${sessionId}`);
  ws.onmessage = (e) => handleEvent(JSON.parse(e.data));
  ws.onerror = () => addMsg('error', 'WebSocket error');
  ws.onclose = () => document.getElementById('statusDot').classList.add('offline');
  ws.onopen = () => document.getElementById('statusDot').classList.remove('offline');
}

function handleEvent(evt) {
  switch (evt.type) {
    case 'text_delta':
      removeTyping();
      appendDelta(evt.content);
      updateLiveStats();
      break;
    case 'text':
      removeTyping();
      if (_streamBubble) { finalizeDelta(evt.content); }
      else { addMsg('assistant', evt.content); }
      break;
    case 'tool_approval':
      finalizeDelta(null);
      removeTyping();
      showApprovalDialog(evt.tool_name, evt.tool_args);
      break;
    case 'tool_start':
      finalizeDelta(null);
      updateLiveStats();
      addMsg('tool', 'Calling <b>' + escHtml(evt.tool_name) + '</b>', 'tool-start');
      break;
    case 'tool_result':
      updateLiveStats();
      addMsg('tool', '<b>' + escHtml(evt.tool_name) + '</b> result:\n' + escHtml(evt.content), 'tool-result');
      break;
    case 'worker_start':
      var wid = evt.metadata ? evt.metadata.worker_id : 1;
      showTerminal();
      ensureWorkerTab(wid);
      switchTab(wid);
      updateWorkerState(wid, 'running');
      workerActive = true;
      break;
    case 'worker_cmd':
      var wid2 = evt.metadata ? evt.metadata.worker_id : activeTabId || 1;
      appendTermLineToWorker(wid2, evt.content, 'cmd');
      break;
    case 'worker_output':
      var wid3 = evt.metadata ? evt.metadata.worker_id : activeTabId || 1;
      appendTermLineToWorker(wid3, evt.content, 'line');
      break;
    case 'worker_done':
      var wid4 = evt.metadata ? evt.metadata.worker_id : activeTabId || 1;
      var ec = evt.metadata ? evt.metadata.exit_code : -1;
      updateWorkerState(wid4, ec === 0 ? 'done' : 'error');
      if (ec === 0) {
        appendTermLineToWorker(wid4, 'Done (exit 0)', 'exit-ok');
      } else {
        appendTermLineToWorker(wid4, 'Exit code: ' + ec, 'exit-err');
      }
      workerActive = Object.values(workerTabs).some(w => w.state === 'running');
      break;
    case 'status':
      addMsg('status', evt.content);
      break;
    case 'error':
      removeTyping();
      addMsg('error', evt.content);
      break;
    case 'stats':
      showStats(evt.metadata);
      break;
    case 'done':
      removeTyping();
      finalizeDelta(null);
      processing = false;
      workerActive = false;
      document.getElementById('sendBtn').style.display = '';
      document.getElementById('stopBtn').style.display = 'none';
      document.getElementById('sendBtn').disabled = false;
      document.getElementById('chatInput').focus();
      break;
  }
}

function sendMessage() {
  const input = document.getElementById('chatInput');
  const msg = input.value.trim();
  if (!msg || !ws || ws.readyState !== 1) return;

  if (workerActive) {
    addMsg('user', msg);
    ws.send(JSON.stringify({ type: 'mid_task_query', message: msg }));
    input.value = '';
    return;
  }

  if (processing) return;

  processing = true;
  document.getElementById('sendBtn').disabled = true;
  document.getElementById('sendBtn').style.display = 'none';
  document.getElementById('stopBtn').style.display = 'inline-block';
  streamStart = Date.now();
  streamTokens = 0;
  resetStats();
  addMsg('user', msg);
  showTyping();
  ws.send(JSON.stringify({ message: msg }));
  input.value = '';
  const mc = document.getElementById('msgCount');
  mc.textContent = parseInt(mc.textContent) + 1;
}

function stopGeneration() {
  if (ws && ws.readyState === 1) {
    ws.send(JSON.stringify({ type: 'cancel' }));
  }
  removeTyping();
  finalizeDelta(null);
  processing = false;
  workerActive = false;
  document.getElementById('sendBtn').style.display = '';
  document.getElementById('stopBtn').style.display = 'none';
  document.getElementById('sendBtn').disabled = false;
  document.getElementById('chatInput').focus();
}

/* ── Terminal Panel (Multi-Worker Tabs) ── */

function showTerminal() {
  const panel = document.getElementById('termPanel');
  panel.classList.add('visible');
  panel.classList.remove('minimized');
}

function hideTerminal() {
  const panel = document.getElementById('termPanel');
  panel.classList.remove('visible');
  workerActive = false;
}

function toggleTerminal() {
  document.getElementById('termPanel').classList.toggle('minimized');
}

function ensureWorkerTab(wid) {
  if (workerTabs[wid]) return;
  const wrap = document.getElementById('termBodyWrap');
  const body = document.createElement('div');
  body.className = 'term-body';
  body.id = 'termBody_' + wid;
  wrap.appendChild(body);

  workerTabs[wid] = { state: 'idle', el: body };
  renderTabs();
  switchTab(wid);
}

function renderTabs() {
  const container = document.getElementById('termTabs');
  container.innerHTML = '';
  const ids = Object.keys(workerTabs).map(Number).sort((a,b) => a - b);
  ids.forEach(wid => {
    const info = workerTabs[wid];
    const tab = document.createElement('div');
    tab.className = 'term-tab' + (wid === activeTabId ? ' active' : '');
    tab.dataset.wid = wid;

    const dot = document.createElement('span');
    dot.className = 'tab-dot ' + (info.state || 'idle');
    tab.appendChild(dot);

    const label = document.createElement('span');
    label.textContent = 'W' + wid;
    tab.appendChild(label);

    const x = document.createElement('span');
    x.className = 'tab-x';
    x.innerHTML = '&#10005;';
    x.onclick = function(e) { e.stopPropagation(); killWorkerById(wid); };
    tab.appendChild(x);

    tab.onclick = function() { switchTab(wid); };
    container.appendChild(tab);
  });
}

function switchTab(wid) {
  activeTabId = wid;
  Object.keys(workerTabs).forEach(id => {
    const info = workerTabs[id];
    if (info.el) info.el.classList.toggle('active', Number(id) === wid);
  });
  renderTabs();
  const info = workerTabs[wid];
  if (info) updateTermStatusFromState(info.state);
}

function updateWorkerState(wid, state) {
  if (!workerTabs[wid]) return;
  workerTabs[wid].state = state;
  renderTabs();
  if (wid === activeTabId) updateTermStatusFromState(state);
}

function updateTermStatusFromState(state) {
  const el = document.getElementById('termStatus');
  if (state === 'running') { el.textContent = 'running...'; el.style.color = 'var(--yellow)'; }
  else if (state === 'done') { el.textContent = 'completed'; el.style.color = 'var(--green)'; }
  else if (state === 'killed') { el.textContent = 'killed'; el.style.color = 'var(--red)'; }
  else if (state === 'error') { el.textContent = 'error'; el.style.color = 'var(--red)'; }
  else { el.textContent = 'idle'; el.style.color = 'var(--text2)'; }
}

function clearActiveTab() {
  if (activeTabId && workerTabs[activeTabId]) {
    workerTabs[activeTabId].el.innerHTML = '';
  }
}

function killActiveWorker() {
  if (activeTabId) killWorkerById(activeTabId);
}

function killWorkerById(wid) {
  if (ws && ws.readyState === 1) {
    ws.send(JSON.stringify({ type: 'worker_kill', worker_id: wid }));
  }
  updateWorkerState(wid, 'killed');
  appendTermLineToWorker(wid, 'Process killed by user', 'exit-err');
  workerActive = Object.values(workerTabs).some(w => w.state === 'running');
}

function appendTermLineToWorker(wid, text, cls) {
  ensureWorkerTab(wid);
  const body = workerTabs[wid].el;
  if (!body) return;
  const div = document.createElement('div');
  div.className = 'term-' + cls;
  div.textContent = text;
  body.appendChild(div);
  body.scrollTop = body.scrollHeight;
}

function resetTerminal() {
  workerTabs = {};
  activeTabId = null;
  document.getElementById('termTabs').innerHTML = '';
  document.getElementById('termBodyWrap').innerHTML = '';
  updateTermStatusFromState('idle');
}

/* ── Message action buttons ── */

function createActions(role) {
  const wrap = document.createElement('div');
  wrap.className = 'msg-actions';
  const mkBtn = (label, title, fn) => {
    const b = document.createElement('button');
    b.textContent = label;
    b.title = title;
    b.onclick = fn;
    return b;
  };
  wrap.appendChild(mkBtn('Copy', 'Copy to clipboard', function() { copyMsg(this); }));
  if (role === 'user') {
    wrap.appendChild(mkBtn('Edit', 'Edit message', function() { editMsg(this); }));
  }
  if (role === 'assistant') {
    wrap.appendChild(mkBtn('Regen', 'Regenerate response', function() { regenerateMsg(this); }));
  }
  wrap.appendChild(mkBtn('Del', 'Delete message', function() { deleteMsg(this); }));
  return wrap;
}

function getMsgEl(btn) { return btn.closest('.msg'); }
function getMsgText(msgEl) { return msgEl?.dataset?.text || msgEl?.querySelector('.msg-bubble')?.textContent || ''; }

function copyMsg(btn) {
  const msgEl = getMsgEl(btn);
  const text = getMsgText(msgEl);
  navigator.clipboard.writeText(text).then(() => {
    const orig = btn.textContent;
    btn.textContent = 'OK';
    setTimeout(() => btn.textContent = orig, 800);
  });
}

function editMsg(btn) {
  const msgEl = getMsgEl(btn);
  document.getElementById('chatInput').value = getMsgText(msgEl);
  document.getElementById('chatInput').focus();
}

function deleteMsg(btn) {
  const msgEl = getMsgEl(btn);
  if (msgEl) msgEl.remove();
}

function regenerateMsg(btn) {
  const msgEl = getMsgEl(btn);
  if (!msgEl) return;
  let prev = msgEl.previousElementSibling;
  while (prev && !prev.classList.contains('msg-user')) prev = prev.previousElementSibling;
  if (!prev) return;
  const text = getMsgText(prev);
  msgEl.remove();
  if (text && ws && ws.readyState === 1 && !processing) {
    processing = true;
    document.getElementById('sendBtn').style.display = 'none';
    document.getElementById('stopBtn').style.display = 'inline-block';
    document.getElementById('sendBtn').disabled = true;
    streamStart = Date.now();
    streamTokens = 0;
    resetStats();
    showTyping();
    ws.send(JSON.stringify({ message: text }));
  }
}

/* ── Tool Approval ── */

function showApprovalDialog(toolName, toolArgs) {
  const container = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = 'msg';
  div.id = 'approvalDialog';
  const argsStr = toolArgs ? JSON.stringify(toolArgs, null, 2) : '{}';
  div.innerHTML =
    '<div class="approval-box">' +
      '<div class="approval-title">Tool Approval Required</div>' +
      '<div class="tool-info"><strong>' + escHtml(toolName) + '</strong></div>' +
      '<pre>' + escHtml(argsStr) + '</pre>' +
      '<div class="approval-btns">' +
        '<button class="btn-allow" onclick="respondApproval(true)">Allow</button>' +
        '<button class="btn-deny" onclick="respondApproval(false)">Deny</button>' +
      '</div>' +
    '</div>';
  container.appendChild(div);
  container.scrollTop = container.scrollHeight;
}

function respondApproval(approved) {
  const dialog = document.getElementById('approvalDialog');
  if (dialog) {
    const box = dialog.querySelector('.approval-box');
    const title = box.querySelector('.approval-title');
    const btns = box.querySelector('.approval-btns');
    if (approved) {
      box.style.borderColor = 'var(--green)';
      title.textContent = 'Approved';
      title.style.color = 'var(--green)';
    } else {
      box.style.borderColor = 'var(--red)';
      title.textContent = 'Denied';
      title.style.color = 'var(--red)';
    }
    if (btns) btns.remove();
    dialog.removeAttribute('id');
  }
  if (ws && ws.readyState === 1) {
    ws.send(JSON.stringify({ type: 'tool_response', approved: approved }));
  }
}

/* ── Core message rendering ── */

function addMsg(role, content, extraClass) {
  const container = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = 'msg msg-' + role + ' ' + (extraClass || '');
  if (role === 'user' || role === 'assistant') div.dataset.text = content;
  const bubble = document.createElement('div');
  bubble.className = 'msg-bubble';
  if (role === 'tool') {
    const label = document.createElement('div');
    label.className = 'tool-label';
    label.textContent = 'Tool';
    bubble.appendChild(label);
    const pre = document.createElement('pre');
    pre.innerHTML = content;
    bubble.appendChild(pre);
  } else if (role === 'assistant') {
    bubble.innerHTML = renderMd(content);
  } else if (role === 'user') {
    bubble.textContent = content;
  } else {
    bubble.innerHTML = content;
  }
  div.appendChild(bubble);
  if (role === 'user' || role === 'assistant') div.appendChild(createActions(role));
  container.appendChild(div);
  container.scrollTop = container.scrollHeight;
}

let _streamBubble = null;
let _streamText = '';

function appendDelta(text) {
  const container = document.getElementById('messages');
  if (!_streamBubble) {
    const div = document.createElement('div');
    div.className = 'msg msg-assistant';
    div.id = 'streamMsg';
    const bubble = document.createElement('div');
    bubble.className = 'msg-bubble';
    div.appendChild(bubble);
    container.appendChild(div);
    _streamBubble = bubble;
    _streamText = '';
  }
  _streamText += text;
  _streamBubble.innerHTML = renderMd(_streamText);
  container.scrollTop = container.scrollHeight;
}

function finalizeDelta(fullText) {
  if (_streamBubble && fullText) _streamBubble.innerHTML = renderMd(fullText);
  const el = document.getElementById('streamMsg');
  if (el) {
    el.dataset.text = fullText || _streamText;
    el.removeAttribute('id');
    if (!el.querySelector('.msg-actions')) el.appendChild(createActions('assistant'));
  }
  _streamBubble = null;
  _streamText = '';
}

function showTyping() {
  const container = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = 'msg msg-assistant';
  div.id = 'typingIndicator';
  div.innerHTML = '<div class="msg-bubble"><div class="typing"><span></span><span></span><span></span></div></div>';
  container.appendChild(div);
  container.scrollTop = container.scrollHeight;
}

function removeTyping() {
  const el = document.getElementById('typingIndicator');
  if (el) el.remove();
}

function escHtml(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function resetStats() {
  const bar = document.getElementById('statsBar');
  bar.style.display = 'flex';
  document.getElementById('statTokens').textContent = '0';
  document.getElementById('statTime').textContent = '0s';
  document.getElementById('statTPS').textContent = '0';
  document.getElementById('statPrompt').textContent = '-';
  document.getElementById('statCompletion').textContent = '0';
}

function updateLiveStats() {
  const bar = document.getElementById('statsBar');
  bar.style.display = 'flex';
  streamTokens++;
  const elapsed = (Date.now() - streamStart) / 1000;
  const tps = streamTokens / (elapsed || 1);
  document.getElementById('statTokens').textContent = streamTokens;
  document.getElementById('statTime').textContent = elapsed.toFixed(1) + 's';
  document.getElementById('statTPS').textContent = tps.toFixed(2);
  document.getElementById('statCompletion').textContent = streamTokens;
}

function showStats(s) {
  if (!s) return;
  const bar = document.getElementById('statsBar');
  bar.style.display = 'flex';
  document.getElementById('statTokens').textContent = s.total_tokens || streamTokens;
  document.getElementById('statTime').textContent = (s.elapsed_sec || ((Date.now() - streamStart) / 1000).toFixed(1)) + 's';
  document.getElementById('statTPS').textContent = (s.tokens_per_sec || 0).toFixed(2);
  document.getElementById('statPrompt').textContent = s.prompt_tokens || 0;
  document.getElementById('statCompletion').textContent = s.completion_tokens || streamTokens;
}

function renderMd(text) {
  let html = escHtml(text);
  html = html.replace(/```(\w*)\n([\s\S]*?)```/g, (_, lang, code) => '<pre><code>' + code.trim() + '</code></pre>');
  html = html.replace(/`([^`]+)`/g, '<code>$1</code>');
  html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  html = html.replace(/\*(.+?)\*/g, '<em>$1</em>');
  html = html.replace(/^### (.+)$/gm, '<h4>$1</h4>');
  html = html.replace(/^## (.+)$/gm, '<h3>$1</h3>');
  html = html.replace(/^# (.+)$/gm, '<h2>$1</h2>');
  html = html.replace(/^- (.+)$/gm, '<li>$1</li>');
  html = html.replace(/\n\n/g, '</p><p>');
  html = '<p>' + html + '</p>';
  return html;
}

init();
</script>
